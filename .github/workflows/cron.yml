name: Saatte Bir Afet Verisi Guncelle

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: pip install requests

    - name: Veriyi Çek ve İşle
      run: python fetch_data.py

    - name: Değişiklikleri Depoya Push Et
      run: |
        git config --global user.name 'Afet Botu'
        git config --global user.email 'bot@ridvanbilgin.com'
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Veri Güncellendi: $(date)" && git push)
